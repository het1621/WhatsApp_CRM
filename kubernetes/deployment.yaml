apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-crm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whatsapp-crm
  template:
    metadata:
      labels:
        app: whatsapp-crm
    spec:
      containers:
      - name: whatsapp-crm
        image: your-docker-repo/whatsapp-crm:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: crm-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: crm-secrets
              key: api-key
---
apiVersion: v1
kind: Service
metadata:
  name: whatsapp-crm-service
spec:
  selector:
    app: whatsapp-crm
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
